<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Agriculture Disease Detection</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; margin:20px; background:#f9f9f9;}
    header{display:flex;align-items:center;gap:10px; margin-bottom: 20px;}
    .upload-section{background:#fff;border:1px solid #ddd;padding:20px;margin:10px 0;border-radius:6px;}
    .result-section{background:#fff;border:1px solid #ddd;padding:20px;margin:10px 0;border-radius:6px;}
    .card{background:#fff;border:1px solid #ddd;padding:10px;margin:10px;display:inline-block;vertical-align:top;border-radius:6px;width:260px;}
    img{max-width:240px;height:auto;display:block;border-radius:4px;}
    .pred{font-size:13px;margin-top:6px;color:#333;}
    .meta{font-size:12px;color:#666;margin-top:4px;}
    .upload-btn{background:#4CAF50;color:white;padding:10px 20px;border:none;border-radius:4px;cursor:pointer;}
    .upload-btn:hover{background:#45a049;}
    .result-img{max-width:400px;height:auto;border:2px solid #4CAF50;border-radius:6px;}
    .predictions{margin-top:10px;padding:10px;background:#f0f8f0;border-radius:4px;}
    .loading{color:#666;font-style:italic;}
  </style>
</head>
<body>
  <header>
    <h2>Agriculture Disease Detection</h2>
    <div style="margin-left:auto">Real-time Detection</div>
  </header>

  <!-- Upload Section -->
  <div class="upload-section">
    <h3>Upload & Detect</h3>
    <form id="uploadForm">
      <input type="file" id="fileInput" accept="image/*" required>
      <input type="text" id="deviceId" placeholder="Device ID (optional)" style="margin-left:10px;padding:8px;">
      <button type="submit" class="upload-btn">Upload & Detect</button>
    </form>
  </div>

  <!-- Detection Result Section -->
  <div class="result-section">
    <h3>Detection Result</h3>
    <div id="detectionResult">
      <p>Upload an image to see detection results.</p>
    </div>
  </div>

  <!-- Recent Records Section -->
  <div class="upload-section">
    <h3>Recent Records</h3>
    <div id="records">Loading...</div>
  </div>

<script>
// Handle file upload and detection
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const fileInput = document.getElementById('fileInput');
    const deviceId = document.getElementById('deviceId').value;
    const resultDiv = document.getElementById('detectionResult');
    
    if (!fileInput.files[0]) {
        alert('Please select a file first!');
        return;
    }
    
    // Show loading state
    resultDiv.innerHTML = '<p class="loading">Processing image... Please wait.</p>';
    
    // Prepare form data
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);
    if (deviceId) {
        formData.append('device_id', deviceId);
    }
    
    try {
        // Send to detection API
        const response = await fetch('/detect', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.status === 'ok') {
            // Display results
            let resultHTML = '';
            
            // Show the processed image
            if (data.image_path) {
                const imagePath = data.image_path.replace(/\\/g, '/');
                resultHTML += `<img src="/image/${imagePath}" class="result-img" alt="Detection Result">`;
            }
            
            // Show predictions
            if (data.predictions && data.predictions.length > 0) {
                resultHTML += '<div class="predictions"><strong>Detections:</strong><br>';
                data.predictions.forEach(pred => {
                    const name = pred.name || `Class ${pred.class}`;
                    const confidence = (pred.confidence * 100).toFixed(1);
                    resultHTML += `<div>• ${name}: ${confidence}% confidence</div>`;
                });
                resultHTML += '</div>';
            } else {
                resultHTML += '<div class="predictions"><strong>No objects detected</strong></div>';
            }
            
            resultDiv.innerHTML = resultHTML;
            
            // Refresh records to show the new detection
            loadRecords();
            
        } else {
            resultDiv.innerHTML = `<p style="color:red;">Error: ${data.detail}</p>`;
        }
        
    } catch (error) {
        resultDiv.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
    }
});

// Load historical records
async function loadRecords(){
  try{
    const res = await fetch('/records');
    const data = await res.json();
    const container = document.getElementById('records');
    if(!data || !data.length){ 
        container.innerHTML = '<p>No records yet.</p>'; 
        return; 
    }
    container.innerHTML = data.map(r => {
      const fname = r.image_path ? r.image_path.split('/').pop().split('\\').pop() : 'unknown';
      const preds = (r.predictions || []).map(p => {
        const txt = p.name ? p.name : (p['class']!==undefined ? p['class'] : 'obj');
        const conf = (p.confidence*100 || p.confidence*100==0) ? (p.confidence*100).toFixed(1) + '%' : '';
        return `<div>• ${txt} ${conf}</div>`;
      }).join('');
      
      const predsDisplay = preds || '<div>No detections</div>';
      
      return `<div class="card">
        <img src="/image/${r.image_path}" alt="Detection" onerror="this.style.display='none'" />
        <div class="meta">${new Date(r.timestamp*1000).toLocaleString()}</div>
        <div class="pred">${predsDisplay}</div>
      </div>`;
    }).join('');
  }catch(e){
    document.getElementById('records').innerHTML = 'Failed to load records: ' + e;
  }
}

// Load records on page load
loadRecords();
</script>
</body>
</html>
